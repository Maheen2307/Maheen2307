              '"Love myself, love yourself." — Answer: Love Myself',
              '"You\'ve shown me I have reasons I should love myself." — Answer: Love Myself',
              '"The me of yesterday, today, and tomorrow, I\'m learning to love myself." — Answer: Love Myself',
              '"It\'s okay, even if it\'s not perfect, it\'s still beautiful." — Answer: Love Myself',
              '"I\'m fine, all of my pain is gone." — I\'m Fine',
              '"Did you see my bag? It\'s full of trophies." — MIC Drop',
              '"You gave me the best of me, so you\'ll give you the best of you." — Magic Shop',
              '"I\'m the one I should love in this world." — Epiphany',
              '"You are the cause of my euphoria." — Euphoria',
              '"Let me love you, just let me love you." — Serendipity',
              '"Just dance, let\'s move to the rhythm." — Trivia: Just Dance',
              '"Is this love? I want to stay in your world." — Trivia: Love',
              '"Alright, let\'s stop this seesaw game." — Trivia: Seesaw',
              '"I\'m so sick of this fake love." — FAKE LOVE',
              '"I want it, this love, I want it real love." — DNA',

              # --- Jung Kook Solos & Tracks (13) ---
              '"Look who we are, we are the dreamers, we make it happen." — Dreamers',
              '"Gather \'round now, look at us, passion is high." — Dreamers',
              '"Respect the love, the only way, cause we can see it." — Dreamers',
              '"Still with you, even if the rain falls." — Still With You',
              '"I need somebody to hold me close tonight." — Somebody',
              '"Are we yes or no? Don\'t leave me hanging." — Yes or No',
              '"Finishing my day in a blink of an eye." — My Time',
              '"All of these lights are colored by you." — My You',
              '"Seven days a week, loving you right." — Seven',
              '"Standing next to you through the storm." — Standing Next to You',
              '"You made me who I am today, thank you." — Begin',
              '"Standing strong no matter how hard it rains." — Still With You',
              '"Every moment spent with you is pure magic." — Euphoria',

              # --- Agust D / SUGA Solos (8) ---
              '"Don\'t let the past weigh down your future." — Snooze',
              '"My memory erased, AMYGDALA, save me." — AMYGDALA',
              '"My music will embrace your pain." — Daechwita',
              '"Past is the past, present is the present." — Haegeum',
              '"Life is a continuous balance of light and dark." — People Pt.2',
              '"May your journey be filled with quiet peace." — So Far Away',
              '"Everything is a passing phase, stay strong." — everythingoes',
              '"My passion will outshine any shadow." — Interlude : Shadow',

              # --- Jin Solos (7) ---
              '"Through the glass, I look at you through the window." — Heart on the Window',
              '"Don\'t say you love me if you\'re gonna leave." — Don\'t Say You Love Me',
              '"When I\'m with you, there is no one else." — The Astronaut',
              '"You light up my sky like a shooting star." — The Astronaut',
              '"I want to shine for you like the moon." — Moon',
              '"Hold on tight, bright days are coming." — Running Wild',
              '"Your smile is my favorite memory." — Tonight',

              # --- Jimin Solos (6) ---
              '"I\'m gonna take my time, step into the light." — Set Me Free Pt.2',
              '"Angel, fly higher into the sky with me." — Angel Pt.2',
              '"Who is my heart waiting for in the dark?" — Who',
              '"You are my destiny, written in the stars." — Serendipity',
              '"Keep walking forward, even in the dark." — Promise',
              '"A gentle breeze carrying my warm heart to you." — With You',

              # --- j-hope Solos (8) ---
              '"Like a masterpiece, my Mona Lisa." — Mona Lisa',
              '"Break it down, yeah we killin\' it." — Killin\' It Girl',
              '"Burn the old, start a new spark." — Arson',
              '"Listen to your heart, let the rhythm flow." — NEURON',
