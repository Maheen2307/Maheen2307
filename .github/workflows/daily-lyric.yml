              '"The desert became an ocean because of us." — Sea'
          ]

          # Randomly pick 7 iconic lyrics
          selected = random.sample(lyrics_pool, min(7, len(lyrics_pool)))

          # Format and encode URL
          encoded_lines = ";".join([urllib.parse.quote(line) for line in selected])
          new_svg_url = f"https://readme-typing-svg.demolab.com?font=Plus+Jakarta+Sans&weight=600&size=15&pause=2500&color=C084FC&center=true&vCenter=true&width=650&height=50&lines={encoded_lines}"

          # Read README.md
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # Replace typing SVG URL
          pattern = r'https://readme-typing-svg\.demolab\.com\?font=Plus\+Jakarta\+Sans&[^\s"\'\)]+'
          updated_content = re.sub(pattern, new_svg_url, content)

          # Write back to README.md
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_content)
          EOF
          python update_script.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "💜 Updated 110 Master Lyrics Pool" && git push)
