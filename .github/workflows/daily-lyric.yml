name: Daily BTS Lyrics Auto-Rotation

on:
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every 24 hours
  workflow_dispatch:      # Allows manual run anytime from Actions tab

jobs:
  update-lyrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rotate BTS Lyrics in README
