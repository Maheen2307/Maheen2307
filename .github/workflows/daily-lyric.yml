              '"We are aliens in this world, shining in our own light." — Aliens',
              '"Setting our dreams on fire, burning with FYA." — FYA',
              '"Upgrading to the next level, welcome to 2.0." — 2.0',
              '"They don\'t know about the magic between us." — they don\'t know \'bout us',
              '"Why try to be normal when you were born to stand out?" — NORMAL',
              '"Round and round like a merry-go-round, we keep spinning." — Merry go round',
              '"Wild at heart, breaking free like animals." — Animals',
              '"Flying higher, straight into the sun without fear." — Into the sun',
              '"Drowning in your eyes, learning how to swim." — Swim',
              '"Please hold on to my hand when the night gets dark." — Please',
              '"Leave the world behind and come over tonight." — Come over',
              '"Just give me one more night under the stars." — One more night',

              # --- Love Yourself: Answer Album Tracks (16) ---
