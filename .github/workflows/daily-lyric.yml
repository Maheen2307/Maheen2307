              # --- Jung Kook Solos (10) ---
              '"You are the cause of my euphoria." — Euphoria',
              '"Take my hands now, you are the cause of my euphoria." — Euphoria',
              '"Look who we are, we are the dreamers, we make it happen." — Dreamers',
              '"Gather \'round now, look at us, passion is high." — Dreamers',
              '"Still with you, even if the rain falls." — Still With You',
              '"Finishing my day in a blink of an eye." — My Time',
              '"Seven days a week, loving you right." — Seven',
              '"Standing next to you through the storm." — Standing Next to You',
              '"You made me who I am today, thank you." — Begin',
              '"All of these lights are colored by you." — My You'
          ]

          # Exactly 7 Lyrics
          selected = random.sample(lyrics_pool, 7)

          # Format URL
          encoded_lines = ";".join([urllib.parse.quote(line) for line in selected])
          new_tag = f'<img src="https://readme-typing-svg.demolab.com?font=Plus+Jakarta+Sans&weight=600&size=15&pause=2500&color=C084FC&center=true&vCenter=true&width=650&height=50&lines={encoded_lines}" alt="BTS Lyric SVG" />'

          # Read README.md
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # Strict Regex replace for the entire img tag
          pattern = r'<img src="https://readme-typing-svg\.demolab\.com\?[^"]+" alt="[^"]+" />'
          updated_content = re.sub(pattern, new_tag, content)

          # Write back
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_content)
          EOF
          python update_script.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "💜 100% Pure BTS OT7 & Solos Motivational Lyrics Pool" && git push)
