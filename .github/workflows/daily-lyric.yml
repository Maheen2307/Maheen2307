              '"Cause when we fall, we know how to land." — Permission To Dance',
              '"We were born to be real, not to be perfect." — The Truth Untold',
              '"I\'m full of love, so I\'ll give it all to you." — Heartbeat',
              '"Look at the sky, we are flying together." — Wings',
              '"Don\'t give up, you know you\'re not alone." — A Supplementary Story',
              '"Even if it\'s a steep hill, keep running forward." — Run BTS',
              '"My universe is full of your warm light." — My Universe',
              '"Remember we are always together in spirit." — Take Two',
