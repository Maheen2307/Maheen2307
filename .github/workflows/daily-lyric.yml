          cat << 'EOF' > update_script.py
          import re, random, urllib.parse

          # 💜 100% Pure BTS (OT7 + Member Solos) Motivational Master Pool (115 Lines)
          lyrics_pool = [
              # --- OT7 Meaningful & Motivational Classics (45) ---
              '"The dawn right before the sun rises is the darkest." — Tomorrow',
              '"Because the dawn before sunrise is darkest, never forget the you of today." — Tomorrow',
              '"You\'re too young to let the world break you." — Run',
              '"Forever, we are young; even when I fall, I get up and run again." — Epilogue: Young Forever',
              '"No season can last forever, no winter lasts forever." — Spring Day',
              '"Erasing all sad memories, hold each other\'s hands and smile." — 2! 3!',
              '"It’s okay, now count 1, 2, 3 and forget. Erase all sad memories." — 2! 3!',
              '"Shine, dream, smile. Light up the night." — Mikrokosmos',
              '"You got me, I dream while looking at you." — Mikrokosmos',
              '"Life goes on... like an echo in the forest." — Life Goes On',
              '"One day the world stopped, but let\'s take a deep breath again." — Life Goes On',
              '"We don\'t need to worry, cause when we fall we know how to land." — Permission To Dance',
              '"We were born to be real, not to be perfect." — The Truth Untold',
              '"Spread your wings and fly high toward the sky." — Wings',
              '"Don\'t give up, you know you\'re not alone." — A Supplementary Story',
              '"Even if it\'s a steep hill, keep running forward." — Run BTS',
              '"Let\'s write our own ending to this story." — For Youth',
              '"Our voices will reach across the oceans." — Louder than bombs',
              '"Your existence alone brings peace to my mind." — Best Of Me',
              '"Keep believing in the magic inside you." — Magic Shop',
              '"On days I hate being myself, I make a door in my heart." — Magic Shop',
              '"It\'s okay to stop, there\'s no need to run without knowing why." — Paradise',
              '"It\'s okay to not have a dream as long as you have moments of happiness." — Paradise',
              '"The best moment is yet to come." — Yet To Come',
              '"We gonna touch the sky, before the day we die." — Yet To Come',
              '"We shine brightest when we are together." — We are Bulletproof: the Eternal',
              '"We were only seven, but we have you all now." — We are Bulletproof: the Eternal',
              '"Every scar is a reminder of our strength." — Black Swan',
              '"Where there is hope, there is always hardship." — Sea',
              '"The desert became an ocean because of us." — Sea',
              '"Love myself, love yourself." — Answer: Love Myself',
              '"You\'ve shown me I have reasons I should love myself." — Answer: Love Myself',
              '"The me of yesterday, today, and tomorrow, I\'m learning to love myself." — Answer: Love Myself',
              '"It\'s okay, even if it\'s not perfect, it\'s still beautiful." — Answer: Love Myself',
              '"Whatever anyone says, I\'m just me." — IDOL',
              '"You can\'t stop me loving myself." — IDOL',
              '"I\'m fine, all of my pain is gone." — I\'m Fine',
              '"Even if I fall again, I\'m okay." — I\'m Fine',
              '"If you can\'t fly, then run. Today we will survive." — Not Today',
              '"Don\'t kneel, don\'t cry, keep your hands up high!" — Not Today',
              '"Reject rejection! I was always too much." — Dope',
              '"Live your life however you want, it’s yours anyway." — Fire',
              '"Don’t try too hard, it’s okay to lose." — Fire',
              '"In the middle of the road, don\'t stop, just keep going." — So What',
              '"I\'m full of love, so I\'ll give it all to you." — Heartbeat',

              # --- RM Solos & Deep Lyrics (10) ---
              '"I\'m just a human learning how to love myself." — Persona',
              '"When it rains, I feel like I\'m not alone." — forever rain',
              '"Even in solitude, flowers bloom in silence." — Wild Flower',
              '"When my fury turns to flame, light the flower." — Wild Flower',
              '"Even if you\'re not perfect, you\'re limited edition." — Do You',
              '"Everything passes, just like everything goes." — everythingoes',
              '"I wish I could love myself." — Reflection',
              '"Moonchild, don\'t cry. When moon rise, it\'s your time." — Moonchild',
              '"We are born in the moonlight, not a fantasy." — Moonchild',
              '"To lose your path is the way to find that path." — Lost',

              # --- Jin Solos (10) ---
              '"I\'m the one I should love in this world." — Epiphany',
              '"Not so perfect, but so beautiful, I\'m the one I should love." — Epiphany',
              '"When I\'m with you, there is no one else." — The Astronaut',
              '"You light up my sky like a shooting star." — The Astronaut',
              '"I want to shine for you like the moon in the night sky." — Moon',
              '"Hold on tight, bright days are coming." — Running Wild',
              '"Your smile is my favorite memory." — Tonight',
              '"Maybe I can\'t touch the sky, but I still want to stretch my hand out." — Awake',
              '"I want to run just a little more." — Awake',
              '"I want to hold you in my arms and tell you it\'s okay." — Abyss',

              # --- SUGA / Agust D Solos (10) ---
              '"Don\'t let the past weigh down your future." — Snooze',
              '"Everything will be okay, dream on." — Snooze',
              '"My memory erased, AMYGDALA, save me." — AMYGDALA',
              '"My music will embrace your pain." — Daechwita',
              '"Past is the past, present is the present." — Haegeum',
              '"Life is a continuous balance of light and dark." — People Pt.2',
              '"Why so serious? So what if you go a bit slow?" — People',
              '"May your creation be with you until the end of your life." — So Far Away',
              '"May your trial end in full bloom." — So Far Away',
              '"My passion will outshine any shadow." — Interlude : Shadow',

              # --- j-hope Solos (10) ---
              '"Hope is the light that leads us out of darkness." — Hope World',
              '"Dance through the pain until you find joy." — Daydream',
              '"Equal love for every soul under the sky." — Equal Sign',
              '"Street lights guide my steps toward the future." — On the street',
              '"Burn the old, start a new spark." — Arson',
              '"Listen to your heart, let the rhythm flow." — NEURON',
              '"Just dance, let\'s move to the rhythm." — Trivia: Just Dance',
              '"I want it, in my life, the passion to keep moving." — MORE',
              '"In my blue dreams, I want to hold you." — Blue Side',
              '"Where is my safety zone in this wild world?" — Safety Zone',

              # --- Jimin Solos (10) ---
              '"You are the cause of my euphoria, my serendipity." — Serendipity',
              '"You are my destiny, written in the stars." — Serendipity',
              '"Keep walking forward, even in the dark." — Promise',
              '"I want you to be your light, baby, you should be your light." — Promise',
              '"I\'m gonna take my time, step into the light." — Set Me Free Pt.2',
              '"Fly away, I won\'t hide anymore." — Set Me Free Pt.2',
              '"Find the me that was innocent." — Lie',
              '"Pick your filter, I can be whatever you want." — Filter',
              '"Who is my heart waiting for in the dark?" — Who',
              '"A gentle breeze carrying my warm heart to you." — With You',

              # --- V Solos (10) ---
              '"Imagine your face, say hello to me, then all the bad days are nothing." — Winter Bear',
              '"She looks like a blue parrot, would you come fly to me?" — Winter Bear',
              '"I wish you could love me again." — Love Me Again',
              '"I still wonder, wonder beautiful story." — Scenery',
              '"A sweet dream that lasts forever in my heart." — Sweet Night',
              '"I see a smiling child, holding out a hand." — Inner Child',
              '"We will change, but the bright boy inside will stay." — Inner Child',
              '"A sound of something breaking, I awake from sleep." — Singularity',
